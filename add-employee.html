<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philtech GMA | Add Employee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Security Scripts -->
    <script src="js/csrf.js"></script>
    <script src="js/xss-protection.js"></script>
    <script src="js/secure-ajax.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #dcd3b8; }
        .form-input:focus { ring: 2px solid #b0303b; border-color: transparent; }
        /* Add to existing style section */
        .group:hover .group-hover\:block {
            display: block !important;
        }

        .user-dropdown {
            position: absolute;
            right: 0;
            margin-top: 0.5rem;
            width: 12rem;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 0.5rem 0;
            z-index: 50;
            display: none;
        }

        .group:hover .user-dropdown {
            display: block;
        }
    </style>
</head>
<body class="text-gray-700 antialiased min-h-screen">

    <!-- Top Navigation Bar -->
    <nav class="bg-[#8a1f27] text-white px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#b0303b] rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-file-invoice text-[#f4e8c1]"></i>
            </div>
            <span class="font-bold text-lg">Philtech GMA</span>
        </div>
        
        <div class="hidden md:flex items-center gap-1">
            <a href="dashboardSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Dashboard</a>
            <a href="employeesSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Employees</a>
            <a href="payrollSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Payroll</a>
            <a href="attendanceSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Attendance</a>
            <a href="settingsSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Settings</a>
        </div>
        
        <div class="flex items-center gap-3">
            <span class="text-sm hidden sm:block" id="userName">Superadmin</span>
            <div class="relative group">
                <img src="https://i.pravatar.cc/150?u=superadmin" class="w-8 h-8 rounded-full border-2 border-white cursor-pointer">
                <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 hidden group-hover:block z-50">
                    <a href="#" onclick="logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6 md:p-8 max-w-4xl mx-auto">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-[#8a1f27]">Add New Employee</h1>
                <p class="text-gray-500 text-sm mt-1" id="currentDate"></p>
            </div>
            <button onclick="goBack()" class="bg-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm hover:shadow-md transition-shadow flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <form id="employeeForm" class="space-y-6">
                <!-- Personal Information -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa-regular fa-user text-[#b0303b]"></i> Personal Information
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name <span class="text-red-500">*</span></label>
                            <input type="text" id="fullName" required 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="Enter full name">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address <span class="text-red-500">*</span></label>
                            <input type="email" id="email" required 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="employee@philtech.edu">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                            <input type="tel" id="phone" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="(046) 123-4567">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Birth Date</label>
                            <input type="date" id="birthDate" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent">
                        </div>
                    </div>
                </div>

                <!-- Employment Details -->
                <div class="pt-4 border-t border-gray-100">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-briefcase text-[#b0303b]"></i> Employment Details
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Employee ID</label>
                            <input type="text" id="employeeId" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="Auto-generated" readonly>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Position <span class="text-red-500">*</span></label>
                            <input type="text" id="position" required 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="e.g., Senior Teacher">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Department</label>
                            <select id="department" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent">
                                <option value="Academic">Academic</option>
                                <option value="Administration">Administration</option>
                                <option value="Finance">Finance</option>
                                <option value="Maintenance">Maintenance</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Employment Type <span class="text-red-500">*</span></label>
                            <select id="employmentType" required 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent">
                                <option value="Regular">Regular</option>
                                <option value="Contractual">Contractual</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Probationary">Probationary</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Hire Date</label>
                            <input type="date" id="hireDate" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                            <select id="status" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent">
                                <option value="Active" selected>Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="On Leave">On Leave</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Compensation -->
                <div class="pt-4 border-t border-gray-100">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-money-bill-wave text-[#b0303b]"></i> Compensation
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Base Salary <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">₱</span>
                                <input type="number" id="salary" required step="0.01"
                                    class="w-full pl-8 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                    placeholder="0.00">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Hourly Rate</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">₱</span>
                                <input type="number" id="hourlyRate" step="0.01"
                                    class="w-full pl-8 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                    placeholder="0.00">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Admin Pay Rate</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">₱</span>
                                <input type="number" id="adminPayRate" step="0.01"
                                    class="w-full pl-8 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                    placeholder="0.00">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Government Numbers -->
                <div class="pt-4 border-t border-gray-100">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-id-card text-[#b0303b]"></i> Government Numbers
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">SSS Number</label>
                            <input type="text" id="sss" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="00-1234567-8">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">PhilHealth Number</label>
                            <input type="text" id="philhealth" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="12-345678901-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Pag-IBIG Number</label>
                            <input type="text" id="pagibig" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="1234-5678-9012">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">TIN Number</label>
                            <input type="text" id="tin" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="123-456-789-000">
                        </div>
                    </div>
                </div>

                <!-- Emergency Contact -->
                <div class="pt-4 border-t border-gray-100">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-phone text-[#b0303b]"></i> Emergency Contact
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Contact Person</label>
                            <input type="text" id="emergencyName" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="Full name">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Relationship</label>
                            <input type="text" id="emergencyRelation" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="e.g., Spouse">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                            <input type="tel" id="emergencyPhone" 
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent"
                                placeholder="(046) 123-4567">
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                    <button type="button" onclick="goBack()" class="px-6 py-2 border border-gray-200 rounded-lg font-medium hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="px-6 py-2 bg-[#b0303b] text-white rounded-lg font-medium hover:bg-[#8a1f27] transition-colors shadow-md">
                        Save Employee
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/database.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        });

        document.getElementById('employeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                const employee = {
                    full_name: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    birth_date: document.getElementById('birthDate').value,
                    position: document.getElementById('position').value,
                    department: document.getElementById('department').value,
                    employment_type: document.getElementById('employmentType').value,
                    hire_date: document.getElementById('hireDate').value || new Date().toISOString().split('T')[0],
                    status: document.getElementById('status').value,
                    base_salary: parseFloat(document.getElementById('salary').value) || 0,
                    hourly_rate: parseFloat(document.getElementById('hourlyRate').value) || 0,
                    admin_pay_rate: parseFloat(document.getElementById('adminPayRate').value) || 0,
                    sss: document.getElementById('sss').value,
                    philhealth: document.getElementById('philhealth').value,
                    pagibig: document.getElementById('pagibig').value,
                    tin: document.getElementById('tin').value,
                    emergency_name: document.getElementById('emergencyName').value,
                    emergency_relation: document.getElementById('emergencyRelation').value,
                    emergency_phone: document.getElementById('emergencyPhone').value
                };

                const response = await fetch('/api/employees.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(employee)
                });
                
                if (!response.ok) {
                    throw new Error('Failed to add employee');
                }
                
                const result = await response.json();
                if (result.success) {
                    alert('Employee added successfully!');
                    window.location.href = 'employeesSadmin.html';
                }
            } catch (error) {
                console.error('Error adding employee:', error);
                alert('Error adding employee. Please try again.');
            }
        });

        function goBack() {
            window.location.href = 'employeesSadmin.html';
        }
    </script>
</body>
</html>
