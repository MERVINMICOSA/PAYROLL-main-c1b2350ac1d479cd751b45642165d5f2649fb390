<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philtech GMA | My Payslips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Security Scripts -->
    <script src="js/csrf.js"></script>
    <script src="js/xss-protection.js"></script>
    <script src="js/secure-ajax.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #dcd3b8; }
        .nav-link.active { background-color: #b0303b; color: white; }
        /* Add to existing style section */
        .group:hover .group-hover\:block {
            display: block !important;
        }

        .user-dropdown {
            position: absolute;
            right: 0;
            margin-top: 0.5rem;
            width: 12rem;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 0.5rem 0;
            z-index: 50;
            display: none;
        }

        .group:hover .user-dropdown {
            display: block;
        }
    </style>
</head>
<body class="text-gray-700 antialiased min-h-screen">

    <!-- Top Navigation Bar -->
    <nav class="bg-[#8a1f27] text-white px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#b0303b] rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-chalkboard-user text-[#f4e8c1]"></i>
            </div>
            <span class="font-bold text-lg">Philtech GMA - Teacher Portal</span>
        </div>
        
        <div class="hidden md:flex items-center gap-1">
            <a href="teacher-dashboard.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Dashboard</a>
            <a href="teacher-payslips.html" class="nav-link active px-4 py-2 rounded-lg bg-[#b0303b] text-white font-medium">My Payslips</a>
            <a href="teacher-attendance.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">My Attendance</a>
            <a href="teacher-profile.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">My Profile</a>
        </div>
        
        <div class="flex items-center gap-3">
            <span class="text-sm hidden sm:block" id="userName">Teacher</span>
            <div class="relative group">
                <img src="https://i.pravatar.cc/150?u=teacher" class="w-8 h-8 rounded-full border-2 border-white cursor-pointer">
                <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 hidden group-hover:block z-50">
                    <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
                    <a href="#" onclick="logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6 md:p-8 max-w-7xl mx-auto">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-[#8a1f27]">My Payslips</h1>
                <p class="text-gray-500 text-sm mt-1" id="currentDate"></p>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search by period..." 
                        class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-[#b0303b] focus:border-transparent w-64">
                </div>
                <select class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-[#b0303b] focus:border-transparent">
                    <option value="all">All Year</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                </select>
            </div>
        </div>

        <!-- Stats Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 mb-1">Total Payslips</p>
                <h3 class="text-2xl font-bold text-gray-800" id="totalPayslips">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 mb-1">Total Net Pay (YTD)</p>
                <h3 class="text-2xl font-bold text-[#b0303b]" id="totalNetPay">₱0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 mb-1">Average Monthly</p>
                <h3 class="text-2xl font-bold text-gray-800" id="averagePay">₱0</h3>
            </div>
        </div>

        <!-- Payslips Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-xs text-gray-500">
                        <tr>
                            <th class="py-3 px-6">Period</th>
                            <th class="py-3">Gross Pay</th>
                            <th class="py-3">Deductions</th>
                            <th class="py-3">Net Pay</th>
                            <th class="py-3">Status</th>
                            <th class="py-3 text-right pr-6">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm" id="payslipTableBody">
                        <tr><td colspan="6" class="py-8 text-center text-gray-400">Loading your payslips...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="px-6 py-3 border-t border-gray-100 flex justify-between items-center">
                <span class="text-xs text-gray-400" id="paginationInfo">Showing 0-0 of 0</span>
                <div class="flex gap-1" id="paginationControls"></div>
            </div>
        </div>

        <!-- Modal for Payslip View -->
        <div id="payslipModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
            <div class="bg-white rounded-2xl max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white">
                    <h3 class="text-xl font-bold text-[#8a1f27]">Payslip Details</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                </div>
                <div class="p-6" id="payslipModalContent">
                    <!-- Content will be loaded here -->
                </div>
                <div class="p-6 border-t border-gray-100 flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 border border-gray-200 rounded-lg hover:bg-gray-50">Close</button>
                    <button onclick="downloadCurrentPayslip()" class="px-4 py-2 bg-[#b0303b] text-white rounded-lg hover:bg-[#8a1f27]">Download PDF</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/database.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        let allPayslips = [];
        let allEmployees = [];
        let teacherId = null;
        let currentPage = 1;
        const itemsPerPage = 10;
        let currentPayslipId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await Database.ensureDatabaseReady();
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            
            await loadTeacherData();
            
            document.getElementById('searchInput').addEventListener('input', filterPayslips);
        });

        async function loadTeacherData() {
            // Get current user
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userName').textContent = user.full_name || user.username || 'Teacher';
            
            // Find employee record linked to this teacher
            allEmployees = await Database.getAllEmployees();
            const teacherEmployee = allEmployees.find(e => e.email === user.email || e.employee_id === user.employee_id) || allEmployees[0];
            
            if (teacherEmployee) {
                teacherId = teacherEmployee.id;
                await loadPayslips();
            }
        }

        async function loadPayslips() {
            if (!teacherId) return;
            
            const payroll = await Database.getAllPayroll();
            allPayslips = payroll.filter(p => p.employee_id === teacherId);
            
            // Update stats
            document.getElementById('totalPayslips').textContent = allPayslips.length;
            
            const totalNet = allPayslips.reduce((sum, p) => sum + parseFloat(p.net_salary || 0), 0);
            document.getElementById('totalNetPay').textContent = '₱' + totalNet.toLocaleString();
            
            const avgPay = allPayslips.length ? totalNet / allPayslips.length : 0;
            document.getElementById('averagePay').textContent = '₱' + avgPay.toLocaleString();
            
            renderTable();
        }

        function renderTable(records = allPayslips) {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = records.slice(start, end);
            const totalPages = Math.ceil(records.length / itemsPerPage);
            
            const tbody = document.getElementById('payslipTableBody');
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-gray-400">No payslips found</td></tr>';
            } else {
                tbody.innerHTML = pageData.map(p => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="py-3 px-6 font-medium">${p.period || 'N/A'}</td>
                        <td class="py-3">₱${(p.gross_salary || 0).toLocaleString()}</td>
                        <td class="py-3">₱${(p.total_deduction || 0).toLocaleString()}</td>
                        <td class="py-3 font-medium text-[#b0303b]">₱${(p.net_salary || 0).toLocaleString()}</td>
                        <td class="py-3"><span class="px-2 py-1 rounded-full text-xs ${p.status === 'Paid' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'}">${p.status}</span></td>
                        <td class="py-3 pr-6 text-right">
                            <button onclick="viewPayslip(${p.id})" class="text-[#b0303b] hover:text-[#8a1f27] mr-2"><i class="fa-regular fa-eye"></i></button>
                            <button onclick="downloadPayslip(${p.id})" class="text-[#b0303b] hover:text-[#8a1f27]"><i class="fa-solid fa-download"></i></button>
                        </td>
                    </tr>
                `).join('');
            }
            
            document.getElementById('paginationInfo').textContent = `Showing ${records.length ? start + 1 : 0}-${Math.min(end, records.length)} of ${records.length}`;
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            let html = '';
            html += `<button class="w-8 h-8 rounded-lg border ${currentPage === 1 ? 'bg-gray-100 text-gray-400' : 'hover:bg-[#b0303b] hover:text-white'} transition-colors" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left text-xs"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="w-8 h-8 rounded-lg ${i === currentPage ? 'bg-[#b0303b] text-white' : 'border hover:bg-[#d98989] hover:text-white'} transition-colors text-xs font-medium" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span class="w-8 h-8 flex items-center justify-center">...</span>`;
                }
            }
            html += `<button class="w-8 h-8 rounded-lg border ${currentPage === totalPages ? 'bg-gray-100 text-gray-400' : 'hover:bg-[#b0303b] hover:text-white'} transition-colors" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right text-xs"></i></button>`;
            document.getElementById('paginationControls').innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(allPayslips.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }

        function filterPayslips() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPayslips.filter(p => 
                p.period?.toLowerCase().includes(search)
            );
            renderTable(filtered);
        }

        async function viewPayslip(id) {
            currentPayslipId = id;
            const payslip = allPayslips.find(p => p.id === id);
            const employee = allEmployees.find(e => e.id === payslip.employee_id);
            
            const modalContent = document.getElementById('payslipModalContent');
            modalContent.innerHTML = `
                <div class="text-center border-b pb-6 mb-6">
                    <h2 class="text-2xl font-bold text-[#b0303b]">Philtech GMA</h2>
                    <p class="text-gray-500">Payslip for ${payslip.period || 'N/A'}</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><span class="text-gray-500">Employee:</span> <span class="font-medium">${employee?.full_name || 'Unknown'}</span></div>
                    <div><span class="text-gray-500">Position:</span> <span class="font-medium">${employee?.position || 'Teacher'}</span></div>
                    <div><span class="text-gray-500">Employee ID:</span> <span class="font-medium">${employee?.employee_id || 'TCH' + employee?.id}</span></div>
                    <div><span class="text-gray-500">Status:</span> <span class="px-2 py-1 rounded-full text-xs ${payslip.status === 'Paid' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'}">${payslip.status}</span></div>
                </div>
                <div class="space-y-3 mb-6">
                    <div class="flex justify-between py-2 border-b"><span>Basic Salary</span><span class="font-medium">₱${(payslip.gross_salary || 0).toLocaleString()}</span></div>
                    <div class="flex justify-between py-2 border-b"><span>SSS</span><span class="font-medium">₱${(payslip.sss || payslip.gross_salary * 0.045 || 0).toLocaleString()}</span></div>
                    <div class="flex justify-between py-2 border-b"><span>PhilHealth</span><span class="font-medium">₱${(payslip.philhealth || payslip.gross_salary * 0.03 || 0).toLocaleString()}</span></div>
                    <div class="flex justify-between py-2 border-b"><span>Pag-IBIG</span><span class="font-medium">₱${(payslip.pagibig || 100).toLocaleString()}</span></div>
                    <div class="flex justify-between py-2 border-b"><span>Withholding Tax</span><span class="font-medium">₱${(payslip.tax || payslip.gross_salary * 0.1 || 0).toLocaleString()}</span></div>
                    <div class="flex justify-between py-2 border-b"><span class="font-semibold">Total Deductions</span><span class="font-medium">₱${(payslip.total_deduction || 0).toLocaleString()}</span></div>
                    <div class="flex justify-between py-2 text-lg font-bold text-[#b0303b]"><span>NET PAY</span><span>₱${(payslip.net_salary || 0).toLocaleString()}</span></div>
                </div>
                <div class="text-center text-gray-400 text-sm">Generated on ${new Date().toLocaleDateString()}</div>
            `;
            
            document.getElementById('payslipModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('payslipModal').classList.add('hidden');
        }

        function downloadPayslip(id) {
            alert('Downloading payslip ID: ' + id);
        }

        function downloadCurrentPayslip() {
            if (currentPayslipId) downloadPayslip(currentPayslipId);
        }
    </script>
</body>
</html>
