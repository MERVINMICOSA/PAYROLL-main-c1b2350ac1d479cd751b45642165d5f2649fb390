<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philtech GMA | Attendance Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Security Scripts -->
    <script src="js/csrf.js"></script>
    <script src="js/xss-protection.js"></script>
    <script src="js/secure-ajax.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #dcd3b8; }
        .nav-link.active { background-color: #b0303b; color: white; }
        .attendance-row:hover { background-color: rgba(217, 137, 137, 0.1); }
        /* Add to existing style section */
        .group:hover .group-hover\:block {
            display: block !important;
        }

        .user-dropdown {
            position: absolute;
            right: 0;
            margin-top: 0.5rem;
            width: 12rem;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 0.5rem 0;
            z-index: 50;
            display: none;
        }

        .group:hover .user-dropdown {
            display: block;
        }
    </style>
</head>
<body class="text-gray-700 antialiased min-h-screen">

    <!-- Top Navigation Bar -->
    <nav class="bg-[#8a1f27] text-white px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#b0303b] rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-file-invoice text-[#f4e8c1]"></i>
            </div>
            <span class="font-bold text-lg">Philtech GMA</span>
        </div>
        
        <div class="hidden md:flex items-center gap-1">
            <a href="dashboardSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Dashboard</a>
            <a href="employeesSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Employees</a>
            <a href="payrollSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Payroll</a>
            <a href="attendanceSadmin.html" class="nav-link active px-4 py-2 rounded-lg bg-[#b0303b] text-white font-medium">Attendance</a>
            <a href="report.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Reports</a>
            <a href="user-mgmt.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Users</a>
            <a href="settingsSadmin.html" class="nav-link px-4 py-2 rounded-lg hover:bg-[#d98989] transition-colors font-medium">Settings</a>
        </div>
        
        <div class="flex items-center gap-3">
            <span class="text-sm hidden sm:block" id="userName">Superadmin</span>
            <div class="relative group">
                <img src="https://i.pravatar.cc/150?u=superadmin" class="w-8 h-8 rounded-full border-2 border-white cursor-pointer">
                <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 hidden group-hover:block z-50">
                    <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
                    <a href="#" onclick="logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6 md:p-8 max-w-7xl mx-auto">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-[#8a1f27]">Attendance Management</h1>
                <p class="text-gray-500 text-sm mt-1" id="currentDate"></p>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative flex-1 md:w-64">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search employees..." 
                        class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#b0303b] focus:border-transparent">
                </div>
                <button onclick="addAttendance()" class="bg-[#b0303b] text-white px-4 py-2 rounded-lg hover:bg-[#8a1f27] transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add
                </button>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-lg bg-[#b0303b]/10 text-[#b0303b] flex items-center justify-center">
                        <i class="fa-regular fa-calendar-check"></i>
                    </div>
                    <span class="text-sm text-gray-500">Total Records</span>
                </div>
                <h3 class="text-2xl font-bold text-gray-800" id="totalRecords">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-lg bg-[#b0303b]/10 text-[#b0303b] flex items-center justify-center">
                        <i class="fa-regular fa-clock"></i>
                    </div>
                    <span class="text-sm text-gray-500">Total Hours</span>
                </div>
                <h3 class="text-2xl font-bold text-gray-800" id="totalHours">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-lg bg-[#b0303b]/10 text-[#b0303b] flex items-center justify-center">
                        <i class="fa-solid fa-clock"></i>
                    </div>
                    <span class="text-sm text-gray-500">Overtime</span>
                </div>
                <h3 class="text-2xl font-bold text-gray-800" id="totalOvertime">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-lg bg-[#b0303b]/10 text-[#b0303b] flex items-center justify-center">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <span class="text-sm text-gray-500">Employees</span>
                </div>
                <h3 class="text-2xl font-bold text-gray-800" id="totalEmployees">0</h3>
            </div>
        </div>

        <!-- Attendance Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-xs text-gray-500">
                        <tr>
                            <th class="py-3 px-6">Employee</th>
                            <th class="py-3">Date</th>
                            <th class="py-3">Hours Worked</th>
                            <th class="py-3">Overtime</th>
                            <th class="py-3">Pay Type</th>
                            <th class="py-3 text-right pr-6">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm" id="attendanceTableBody">
                        <tr><td colspan="6" class="py-8 text-center text-gray-400">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="px-6 py-3 border-t border-gray-100 flex justify-between items-center">
                <span class="text-xs text-gray-400" id="paginationInfo">Showing 0-0 of 0</span>
                <div class="flex gap-1" id="paginationControls"></div>
            </div>
        </div>
    </main>

    <script src="js/api-integration.js"></script>
    <script src="js/database.js"></script>
    <script src="js/navigation.js"></script>
    <script>
        let allAttendance = [];
        let allEmployees = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        document.addEventListener('DOMContentLoaded', async () => {
            await Database.ensureDatabaseReady();
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            
            Database.Events.on(DB_EVENTS.ATTENDANCE_ADDED, loadData);
            Database.Events.on(DB_EVENTS.ATTENDANCE_UPDATED, loadData);
            Database.Events.on(DB_EVENTS.ATTENDANCE_DELETED, loadData);
            
            await loadData();
            
            document.getElementById('searchInput').addEventListener('input', filterTable);
        });

        async function loadData() {
            allAttendance = await Database.getAllAttendance();
            allEmployees = await Database.getAllEmployees();
            
            // Update summary cards
            document.getElementById('totalRecords').textContent = allAttendance.length;
            
            const totalHours = allAttendance.reduce((sum, a) => sum + (a.hours_worked || a.hours_attended || 0), 0);
            document.getElementById('totalHours').textContent = totalHours + ' hrs';
            
            const totalOvertime = allAttendance.reduce((sum, a) => sum + (a.overtime_hours || a.ot_hours || 0), 0);
            document.getElementById('totalOvertime').textContent = totalOvertime + ' hrs';
            
            document.getElementById('totalEmployees').textContent = allEmployees.length;
            
            renderTable();
        }

        function renderTable(records = allAttendance) {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = records.slice(start, end);
            const totalPages = Math.ceil(records.length / itemsPerPage);
            
            const tbody = document.getElementById('attendanceTableBody');
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-gray-400">No attendance records</td></tr>';
            } else {
                tbody.innerHTML = pageData.map(a => {
                    const emp = allEmployees.find(e => e.id === a.employee_id) || { full_name: 'Unknown' };
                    return `
                        <tr class="border-b hover:bg-gray-50 attendance-row">
                            <td class="py-3 px-6 font-medium">${emp.full_name}</td>
                            <td class="py-3">${a.attendance_date || a.date || 'N/A'}</td>
                            <td class="py-3">${a.hours_worked || a.hours_attended || 0} hrs</td>
                            <td class="py-3">${a.overtime_hours || a.ot_hours || 0} hrs</td>
                            <td class="py-3"><span class="px-2 py-1 bg-[#b0303b]/10 text-[#b0303b] rounded-full text-xs">${a.pay_type || 'Regular'}</span></td>
                            <td class="py-3 pr-6 text-right">
                                <button onclick="editAttendance(${a.id})" class="text-[#b0303b] hover:text-[#8a1f27] mr-2"><i class="fa-regular fa-pen-to-square"></i></button>
                                <button onclick="viewAttendance(${a.id})" class="text-[#b0303b] hover:text-[#8a1f27] mr-2"><i class="fa-regular fa-eye"></i></button>
                                <button onclick="deleteAttendance(${a.id})" class="text-red-600 hover:text-red-800"><i class="fa-regular fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
            
            document.getElementById('paginationInfo').textContent = `Showing ${records.length ? start + 1 : 0}-${Math.min(end, records.length)} of ${records.length}`;
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            let html = '';
            html += `<button class="w-8 h-8 rounded-lg border ${currentPage === 1 ? 'bg-gray-100 text-gray-400' : 'hover:bg-[#b0303b] hover:text-white'} transition-colors" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left text-xs"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="w-8 h-8 rounded-lg ${i === currentPage ? 'bg-[#b0303b] text-white' : 'border hover:bg-[#d98989] hover:text-white'} transition-colors text-xs font-medium" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span class="w-8 h-8 flex items-center justify-center">...</span>`;
                }
            }
            html += `<button class="w-8 h-8 rounded-lg border ${currentPage === totalPages ? 'bg-gray-100 text-gray-400' : 'hover:bg-[#b0303b] hover:text-white'} transition-colors" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right text-xs"></i></button>`;
            document.getElementById('paginationControls').innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(allAttendance.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAttendance.filter(a => {
                const emp = allEmployees.find(e => e.id === a.employee_id);
                return emp?.full_name.toLowerCase().includes(search);
            });
            renderTable(filtered);
        }

        function editAttendance(id) { window.location.href = `edit-attendanceSadmin.html?id=${id}`; }
        function viewAttendance(id) { window.location.href = `view-attendanceSadmin.html?id=${id}`; }
        function addAttendance() { window.location.href = 'add-attendanceSadmin.html'; }
        
        async function deleteAttendance(id) {
            if (!confirm('Are you sure you want to delete this attendance record?')) return;
            try {
                await Database.deleteAttendance(id);
                alert('Attendance record deleted successfully');
            } catch (error) {
                console.error('Error deleting attendance:', error);
                alert('Error deleting attendance record');
            }
        }
    </script>
</body>
</html>
