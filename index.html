<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philtech GMA | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #dcd3b8 0%, #f0e8d0 100%); }
        .login-card { transition: all 0.3s ease; }
        .login-card:hover { transform: translateY(-5px); box-shadow: 0 30px 40px -20px rgba(176, 48, 59, 0.4); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(176, 48, 59, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(176, 48, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(176, 48, 59, 0); } }
        .avatar-circle { animation: pulse 2s infinite; }
        
        .error-message { color: #dc2626; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; }
        .success-message { color: #16a34a; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; }
        .info-message { color: #3b82f6; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #b0303b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl w-full max-w-md p-8 login-card border border-white/20">
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 bg-[#b0303b] rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-file-invoice text-white text-3xl"></i>
            </div>
        </div>
        
        <h2 class="text-2xl font-bold text-center text-[#8a1f27] mb-2">Philtech GMA</h2>
        <p class="text-center text-gray-500 text-sm mb-8">Payroll Management System</p>

        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-[#b0303b] to-[#8a1f27] rounded-full flex items-center justify-center text-white text-3xl avatar-circle">
                <i class="fa-regular fa-user"></i>
            </div>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fa-regular fa-user"></i>
                    </span>
                    <input type="text" id="username" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#b0303b] focus:border-transparent transition-all"
                        placeholder="Enter username">
                </div>
                <p class="text-xs text-gray-400 mt-1">Use: accountant, superadmin, or oic</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required
                        class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#b0303b] focus:border-transparent transition-all"
                        placeholder="Enter password">
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#b0303b]">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-400 mt-1">Default: accountant123</p>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="rounded text-[#b0303b] focus:ring-[#b0303b]">
                    <span class="text-gray-600">Remember me</span>
                </label>
                <a href="#" id="forgotPassword" class="text-[#b0303b] hover:text-[#8a1f27] transition-colors">Forgot password?</a>
            </div>

            <div id="messageContainer"></div>

            <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-[#b0303b] to-[#8a1f27] text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                Sign In
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            Need assistance? 
            <a href="#" class="text-[#b0303b] hover:text-[#8a1f27] font-medium">Contact Administrator</a>
        </p>
    </div>

    <!-- Password Reset Modal -->
    <div id="resetModal" class="modal hidden">
        <div class="modal-content">
            <h3 class="text-xl font-bold text-[#8a1f27] mb-4">Reset Password</h3>
            <p class="text-gray-600 text-sm mb-4">Enter your username to reset password.</p>
            <input type="text" id="resetUsername" placeholder="Username" 
                class="w-full px-4 py-2 border border-gray-200 rounded-lg mb-4 focus:ring-2 focus:ring-[#b0303b]">
            <div class="flex gap-3">
                <button onclick="sendPasswordReset()" class="flex-1 bg-[#b0303b] text-white py-2 rounded-lg hover:bg-[#8a1f27]">Reset Password</button>
                <button onclick="closeResetModal()" class="flex-1 bg-gray-200 py-2 rounded-lg hover:bg-gray-300">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const icon = this.querySelector('i');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        }

        // Check if already logged in - redirect to dashboard
        (async function checkExistingSession() {
            try {
                const response = await fetch('/api/auth/session.php', {
                    method: 'GET',
                    credentials: 'include',
                    cache: 'no-store'
                });
                const result = await response.json();
                
                if (result.user && result.user.role) {
                    const dashboards = {
                        'superadmin': 'dashboardSadmin.html',
                        'accountant': 'dashboard.html',
                        'oic': 'dashboard-oic.html',
                        'teacher': 'teacher-dashboard.html',
                        'guard': 'dashboard-guard.html',
                        'sa': 'dashboard-sa.html',
                        'admin-staff': 'dashboard-staff.html'
                    };
                    window.location.replace(dashboards[result.user.role] || 'dashboard.html');
                }
            } catch (e) {
                // Not logged in, stay on login page
            }
        })();

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            if (!container) return;
            let className = type === 'error' ? 'error-message' : (type === 'success' ? 'success-message' : 'info-message');
            container.innerHTML = `<div class="${className}">${text}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
            } else {
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        }

        // Determine dashboard based on role
        function getDashboardForRole(role) {
            const dashboards = {
                'superadmin': 'dashboardSadmin.html',
                'accountant': 'dashboard.html',
                'oic': 'dashboard-oic.html',
                'teacher': 'teacher-dashboard.html',
                'admin': 'dashboard-staff.html',
                'staff': 'dashboard-staff.html',
                'guard': 'dashboard-guard.html',
                'sa': 'dashboard-sa.html'
            };
            return dashboards[role] || 'dashboard.html';
        }

        // Login handler - calls backend API with session
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe')?.checked || false;
            
            if (!username || !password) {
                showMessage('Please enter username and password', 'error');
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch('/api/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // DON'T store token in localStorage anymore
                    // Session is handled by PHP cookie
                    
                    if (rememberMe) {
                        localStorage.setItem('rememberedUser', username);
                    } else {
                        localStorage.removeItem('rememberedUser');
                    }
                    
                    showMessage(`Welcome, ${result.user.full_name}! Redirecting...`, 'success');
                    
                    // Redirect based on role
                    const dashboards = {
                        'superadmin': 'dashboardSadmin.html',
                        'accountant': 'dashboard.html',
                        'oic': 'dashboard-oic.html',
                        'teacher': 'teacher-dashboard.html',
                        'guard': 'dashboard-guard.html',
                        'sa': 'dashboard-sa.html',
                        'admin-staff': 'dashboard-staff.html'
                    };
                    
                    const redirect = dashboards[result.user.role] || 'dashboard.html';
                    setTimeout(() => { window.location.href = redirect; }, 800);
                    
                } else {
                    showMessage(result.error || 'Invalid username or password', 'error');
                    setLoading(false);
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Connection error. Please try again.', 'error');
                setLoading(false);
            }
        });

        // Password reset
        window.sendPasswordReset = async function() {
            const username = document.getElementById('resetUsername').value.trim();
            if (!username) {
                showMessage('Please enter your username', 'error');
                return;
            }
            
            showMessage('Please contact the administrator to reset your password.', 'info');
            closeResetModal();
        };
        
        window.closeResetModal = function() {
            document.getElementById('resetModal').classList.add('hidden');
            document.getElementById('resetUsername').value = '';
        };
        
        document.getElementById('forgotPassword')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('resetModal').classList.remove('hidden');
        });
        
        // Load remembered username if exists
        const rememberedUser = localStorage.getItem('rememberedUser');
        if (rememberedUser) {
            document.getElementById('username').value = rememberedUser;
            document.getElementById('rememberMe').checked = true;
        }
        
        console.log('Login page ready - Backend API Login');
    </script>
</body>
</html>
